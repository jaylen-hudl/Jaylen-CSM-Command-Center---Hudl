<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jaylen — CSM Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080809;
  --surface:#0e0e10;
  --surface2:#131315;
  --surface3:#1a1a1d;
  --border:#1e1e22;
  --border2:#272729;
  --border3:#303034;
  --text:#e8e6e1;
  --text2:#9d9b96;
  --text3:#5a5856;
  --accent:#c8b89a;
  --accent2:#a89880;
  --green:#4a9e78;
  --green-dim:#2a5c46;
  --amber:#c4933a;
  --amber-dim:#6b4f1e;
  --red:#b85c5c;
  --red-dim:#5c2a2a;
  --blue:#5b82b5;
  --blue-dim:#2a3d5a;
  --purple:#7c6fa0;
  --slate:#6b7280;
  --tag-lax:#4a7a6a;
  --tag-bball:#5a6e8a;
  --tag-foot:#7a5a4a;
  --tag-base:#6a7a4a;
  --tag-field:#5a6a7a;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden;}
::selection{background:var(--accent);color:#000;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px;}

/* ── NAV ── */
.nav{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);padding:0 28px;background:var(--surface);position:sticky;top:0;z-index:50;}
.nav-logo{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:18px 0;margin-right:32px;white-space:nowrap;}
.nav-logo span{color:var(--accent);}
.nav-tabs{display:flex;gap:0;flex:1;}
.nav-tab{padding:18px 20px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;letter-spacing:0.2px;}
.nav-tab:hover{color:var(--text2);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.sync-pill{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);padding:5px 10px;border:1px solid var(--border2);border-radius:4px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.spin{background:var(--amber);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── LAYOUT ── */
.page{display:none;padding:28px;max-width:1200px;margin:0 auto;}
.page.active{display:block;}

/* ── HOME ── */
.home-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;}
.home-main{display:flex;flex-direction:column;gap:20px;}
.home-side{display:flex;flex-direction:column;gap:20px;}

/* section cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;}
.card-body{padding:16px 18px;}

/* quick links */
.qlinks{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.qlink{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.15s;text-decoration:none;}
.qlink:hover{background:var(--surface3);border-color:var(--border2);}
.qlink-icon{font-size:18px;line-height:1;}
.qlink-label{font-size:10px;color:var(--text3);font-weight:500;text-align:center;letter-spacing:0.3px;}

/* weekly calendar */
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.day-col{background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.day-header{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:1px;}
.day-name{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
.day-date{font-size:13px;font-weight:600;color:var(--text);}
.day-col.today .day-header{background:var(--accent)10;}
.day-col.today .day-name{color:var(--accent);}
.day-col.today .day-date{color:var(--accent);}
.day-col.today{border-color:var(--accent)30;}
.day-events{padding:6px;display:flex;flex-direction:column;gap:4px;min-height:80px;}
.event{background:var(--surface3);border-left:2px solid var(--blue);border-radius:4px;padding:5px 7px;font-size:10px;}
.event-time{color:var(--text3);font-family:'DM Mono',monospace;}
.event-title{color:var(--text2);margin-top:1px;line-height:1.3;}
.event.type-1on1{border-left-color:var(--green);}
.event.type-internal{border-left-color:var(--purple);}
.event.type-external{border-left-color:var(--blue);}
.event.type-block{border-left-color:var(--amber);}
.add-event-btn{width:100%;padding:5px;font-size:10px;color:var(--text3);background:transparent;border:1px dashed var(--border2);border-radius:4px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.12s;}
.add-event-btn:hover{border-color:var(--border3);color:var(--text2);}

/* task lists */
.task-section{margin-bottom:16px;}
.task-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-check{width:15px;height:15px;border:1px solid var(--border3);border-radius:3px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.task-check.done{background:var(--green-dim);border-color:var(--green);}
.task-check.done::after{content:'✓';font-size:9px;color:var(--green);}
.task-text{font-size:13px;color:var(--text);flex:1;line-height:1.4;}
.task-text.done{color:var(--text3);text-decoration:line-through;}
.task-priority{font-size:9px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:3px;flex-shrink:0;}
.task-priority.high{background:var(--red-dim);color:var(--red);}
.task-priority.med{background:var(--amber-dim);color:var(--amber);}
.task-priority.low{background:var(--surface3);color:var(--text3);}
.task-add{display:flex;gap:8px;margin-top:10px;}
.task-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;}
.task-input::placeholder{color:var(--text3);}
.task-input:focus{border-color:var(--border3);}
.task-add-btn{padding:7px 14px;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.12s;white-space:nowrap;}
.task-add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* projects */
.project-item{padding:12px 0;border-bottom:1px solid var(--border);}
.project-item:last-child{border-bottom:none;}
.project-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.project-name{font-size:13px;font-weight:500;color:var(--text);}
.project-status{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:3px;}
.project-status.active{background:var(--blue-dim);color:var(--blue);}
.project-status.hold{background:var(--amber-dim);color:var(--amber);}
.project-status.done{background:var(--green-dim);color:var(--green);}
.project-bar-wrap{height:3px;background:var(--surface3);border-radius:2px;margin-bottom:6px;}
.project-bar{height:3px;border-radius:2px;background:var(--accent);transition:width 0.3s;}
.project-meta{font-size:11px;color:var(--text3);}

/* summary widgets */
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.summary-stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.summary-val{font-size:22px;font-weight:700;color:var(--text);line-height:1;}
.summary-label{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px;}

/* alerts */
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.alert-item:last-child{border-bottom:none;}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.alert-text{font-size:12px;color:var(--text2);line-height:1.4;}
.alert-sub{font-size:11px;color:var(--text3);margin-top:1px;}

/* ── ACCOUNTS ── */
.acct-controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.ctrl-input{background:var(--surface);border:1px solid var(--border2);border-radius:7px;padding:8px 12px;font-size:12px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;min-width:180px;flex:1;}
.ctrl-input::placeholder{color:var(--text3);}
.ctrl-input:focus{border-color:var(--border3);}
.ctrl-select{background:var(--surface);border:1px solid var(--border2);border-radius:7px;padding:8px 10px;font-size:12px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;cursor:pointer;}
.acct-count{font-size:11px;color:var(--text3);margin-bottom:12px;font-family:'DM Mono',monospace;}
.acct-grid{display:flex;flex-direction:column;gap:4px;}
.acct-row{background:var(--surface);border:1px solid var(--border);border-left:3px solid;border-radius:8px;padding:12px 16px;cursor:pointer;transition:background 0.12s;display:flex;align-items:center;gap:12px;}
.acct-row:hover{background:var(--surface2);}
.acct-row-name{font-size:13px;font-weight:500;color:var(--text);flex:1;min-width:140px;}
.acct-row-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.acct-row-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.pill{font-size:10px;font-weight:500;padding:3px 9px;border-radius:4px;border:1px solid;white-space:nowrap;font-family:'DM Mono',monospace;}
.health-bar-wrap{width:60px;height:4px;background:var(--surface3);border-radius:2px;}
.health-bar{height:4px;border-radius:2px;}
.arr-val{font-size:13px;font-weight:600;color:var(--text);min-width:56px;text-align:right;font-family:'DM Mono',monospace;}

/* modal */
.modal-bg{position:fixed;inset:0;background:#000000bb;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-bg.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:520px;max-width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 40px 100px #000d;}
.modal-top{padding:22px 24px 16px;border-bottom:1px solid var(--border);}
.modal-name{font-size:18px;font-weight:700;color:var(--text);}
.modal-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.modal-links{display:flex;gap:8px;margin-top:12px;}
.modal-link{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;font-size:11px;color:var(--text2);text-decoration:none;transition:all 0.12s;cursor:pointer;}
.modal-link:hover{border-color:var(--accent);color:var(--accent);}
.modal-body{padding:20px 24px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.modal-stat{background:var(--surface2);border-radius:7px;padding:10px 12px;}
.modal-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.modal-stat-val{font-size:14px;font-weight:600;color:var(--text);margin-top:3px;}
.modal-health{border-radius:8px;padding:14px 16px;margin-bottom:14px;}
.modal-score-num{font-size:36px;font-weight:700;line-height:1;}
.modal-close{padding:7px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.12s;}
.modal-close:hover{color:var(--text);}
.modal-notes-area{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:10px 12px;font-size:12px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;resize:vertical;min-height:70px;line-height:1.5;}
.modal-notes-area::placeholder{color:var(--text3);}
.modal-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

/* ── PIPELINE (existing) ── */
.pipe-wrap{max-width:100%;}

/* sport icons */
.sport-icon{font-size:12px;}

/* health colors */
.h-healthy{color:#4a9e78;}
.h-stable{color:#5b82b5;}
.h-medium{color:#c4933a;}
.h-atrisk{color:#c07050;}
.h-critical{color:#b85c5c;}

/* scrollable account list */
.acct-scroll{max-height:calc(100vh - 280px);overflow-y:auto;padding-right:4px;}

/* empty state */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;}
</style>
</head>

<script>
// ── GIST SYNC ──
const GIST_ID="09fc2d55aa2b32593f49a699a8619b37";
const GIST_FILE="dashboard-data.json";
function getToken(){let t=localStorage.getItem("gh_gist_token");if(!t){t=prompt("Enter your GitHub token to enable sync:");if(t)localStorage.setItem("gh_gist_token",t.trim());}return t;}
const GH_TOKEN=getToken();

let gistData={intent:{},expansion:{},tasks:{daily:[],weekly:[]},projects:[],calEvents:{},acctNotes:{}};
let saveTimer=null;

async function loadGist(){
  setSyncStatus("spin","Connecting...");
  try{
    const r=await fetch(`https://api.github.com/gists/${GIST_ID}`,{headers:{Authorization:`token ${GH_TOKEN}`,Accept:"application/vnd.github.v3+json"}});
    if(!r.ok)throw new Error(r.status);
    const g=await r.json();
    const file=g.files[GIST_FILE];
    if(file&&file.content&&file.content.trim()!=="{}"){
      const d=JSON.parse(file.content);
      gistData={...gistData,...d};
    }
    setSyncStatus("ok","Synced");
  }catch(e){
    setSyncStatus("err","Offline");
    const local=localStorage.getItem("pipeline_data");
    if(local)gistData={...gistData,...JSON.parse(local)};
  }
  initHome();
  renderAccounts();
  initPipeline();
}

function scheduleSave(){
  clearTimeout(saveTimer);
  setSyncStatus("spin","Saving...");
  saveTimer=setTimeout(async()=>{
    localStorage.setItem("pipeline_data",JSON.stringify(gistData));
    try{
      const r=await fetch(`https://api.github.com/gists/${GIST_ID}`,{method:"PATCH",headers:{Authorization:`token ${GH_TOKEN}`,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(gistData,null,2)}}})});
      if(!r.ok)throw new Error();
      setSyncStatus("ok","Saved ✓");
    }catch{setSyncStatus("err","Save failed");}
  },900);
}

function setSyncStatus(s,t){
  document.getElementById("sync-dot").className="sync-dot "+(s==="ok"?"ok":s==="err"?"err":"spin");
  document.getElementById("sync-text").textContent=t;
}

// ── HOME ──
const DAYS=["Mon","Tue","Wed","Thu","Fri"];
function getWeekDates(){
  const today=new Date();
  const dow=today.getDay();
  const monday=new Date(today);
  monday.setDate(today.getDate()-(dow===0?6:dow-1));
  return DAYS.map((_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
}

function initHome(){
  buildCalendar();
  buildSnapshot();
  renderTasks();
  renderProjects();
}

function buildCalendar(){
  const dates=getWeekDates();
  const today=new Date();
  today.setHours(0,0,0,0);

  const first=dates[0],last=dates[4];
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById("week-range").textContent=`${fmt(first)} – ${fmt(last)}`;

  const grid=document.getElementById("week-grid");
  grid.innerHTML="";
  dates.forEach((date,i)=>{
    const isToday=date.toDateString()===today.toDateString();
    const dateKey=date.toISOString().slice(0,10);
    const events=(gistData.calEvents||{})[dateKey]||[];
    const col=document.createElement("div");
    col.className="day-col"+(isToday?" today":"");
    col.innerHTML=`
      <div class="day-header">
        <div class="day-name">${DAYS[i]}</div>
        <div class="day-date">${date.getDate()}</div>
      </div>
      <div class="day-events" id="events-${dateKey}">
        ${events.map(e=>`<div class="event type-${e.type||'external'}"><div class="event-time">${e.time||''}</div><div class="event-title">${e.title}</div></div>`).join('')}
        <button class="add-event-btn" onclick="addCalEvent('${dateKey}')">+ event</button>
      </div>`;
    grid.appendChild(col);
  });
}

function addCalEvent(dateKey){
  const title=prompt("Event title:");
  if(!title)return;
  const time=prompt("Time (e.g. 10:00 AM) — optional:") || "";
  const typeOpts=["external","internal","1on1","block"];
  const typeStr=prompt("Type: external / internal / 1on1 / block") || "external";
  const type=typeOpts.includes(typeStr)?typeStr:"external";
  if(!gistData.calEvents)gistData.calEvents={};
  if(!gistData.calEvents[dateKey])gistData.calEvents[dateKey]=[];
  gistData.calEvents[dateKey].push({title,time,type});
  scheduleSave();
  buildCalendar();
}

function buildSnapshot(){
  const ACCTS=window.ACCOUNT_DATA||[];
  const critical=ACCTS.filter(a=>a.health_status==="Critical").length;
  const atRisk=ACCTS.filter(a=>a.health_status==="At Risk").length;
  const expiring90=ACCTS.filter(a=>a.days_until_renewal<=90).length;
  const totalArr=ACCTS.reduce((s,a)=>s+(a.arr||0),0);

  document.getElementById("snapshot-stats").innerHTML=`
    <div class="summary-stat"><div class="summary-val">${ACCTS.length}</div><div class="summary-label">Total Accounts</div></div>
    <div class="summary-stat"><div class="summary-val" style="color:var(--red)">${critical+atRisk}</div><div class="summary-label">At Risk / Critical</div></div>
    <div class="summary-stat"><div class="summary-val" style="color:var(--amber)">${expiring90}</div><div class="summary-label">Renewing ≤90d</div></div>
    <div class="summary-stat"><div class="summary-val">$${(totalArr/1000).toFixed(0)}k</div><div class="summary-label">Total ARR</div></div>`;

  const alerts=ACCTS.filter(a=>a.health_status==="Critical"||a.days_until_renewal<=30).slice(0,6);
  const alertsEl=document.getElementById("alerts-list");
  if(!alerts.length){alertsEl.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:8px 0;">No urgent items</div>`;return;}
  alertsEl.innerHTML=alerts.map(a=>{
    const isCrit=a.health_status==="Critical";
    const color=isCrit?"var(--red)":a.days_until_renewal<=30?"var(--amber)":"var(--text3)";
    return`<div class="alert-item">
      <div class="alert-dot" style="background:${color}"></div>
      <div><div class="alert-text">${a.name}</div>
      <div class="alert-sub">${isCrit?"Critical health":"Renews in "+a.days_until_renewal+"d"} · $${(a.arr||0).toLocaleString()}</div></div>
    </div>`;
  }).join('');
}

// ── TASKS ──
function renderTasks(){
  const daily=gistData.tasks?.daily||[];
  const weekly=gistData.tasks?.weekly||[];
  const done=daily.filter(t=>t.done).length;
  document.getElementById("task-count").textContent=`${done}/${daily.length} done`;

  const renderList=(items,type)=>items.length===0
    ?`<div style="font-size:12px;color:var(--text3);padding:8px 0;">No tasks yet</div>`
    :items.map((t,i)=>`
    <div class="task-item">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${type}',${i})"></div>
      <div class="task-text ${t.done?'done':''}">${t.text}</div>
      ${t.priority?`<span class="task-priority ${t.priority}">${t.priority}</span>`:''}
      <span onclick="removeTask('${type}',${i})" style="font-size:11px;color:var(--text3);cursor:pointer;padding:2px 4px;" title="Remove">×</span>
    </div>`).join('');

  document.getElementById("daily-tasks").innerHTML=renderList(daily,'daily');
  document.getElementById("weekly-tasks").innerHTML=renderList(weekly,'weekly');
}

function addTask(type){
  const inputId=type==='daily'?'new-task-input':'new-weekly-input';
  const text=document.getElementById(inputId).value.trim();
  if(!text)return;
  const priority=type==='daily'?(document.getElementById('new-task-priority')?.value||'med'):null;
  if(!gistData.tasks)gistData.tasks={daily:[],weekly:[]};
  gistData.tasks[type].push({text,done:false,priority});
  document.getElementById(inputId).value='';
  scheduleSave();
  renderTasks();
}

function toggleTask(type,i){
  gistData.tasks[type][i].done=!gistData.tasks[type][i].done;
  scheduleSave();
  renderTasks();
}

function removeTask(type,i){
  gistData.tasks[type].splice(i,1);
  scheduleSave();
  renderTasks();
}

// ── PROJECTS ──
function renderProjects(){
  const projects=gistData.projects||[];
  const el=document.getElementById("projects-list");
  if(!projects.length){el.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:8px 0;">No projects yet — click + Add</div>`;return;}
  el.innerHTML=projects.map((p,i)=>`
    <div class="project-item">
      <div class="project-top">
        <div class="project-name">${p.name}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="project-status ${p.status||'active'}">${p.status||'active'}</span>
          <span onclick="removeProject(${i})" style="font-size:11px;color:var(--text3);cursor:pointer;">×</span>
        </div>
      </div>
      <div class="project-bar-wrap"><div class="project-bar" style="width:${p.progress||0}%"></div></div>
      <div class="project-meta" style="display:flex;justify-content:space-between">
        <span>${p.desc||''}</span>
        <span>${p.progress||0}%</span>
      </div>
    </div>`).join('');
}

function addProject(){
  const name=prompt("Project name:");
  if(!name)return;
  const desc=prompt("Brief description (optional):") || "";
  const statusInput=prompt("Status: active / hold / done") || "active";
  const status=["active","hold","done"].includes(statusInput)?statusInput:"active";
  const progressStr=prompt("Progress % (0-100):") || "0";
  const progress=Math.min(100,Math.max(0,parseInt(progressStr)||0));
  if(!gistData.projects)gistData.projects=[];
  gistData.projects.push({name,desc,status,progress});
  scheduleSave();
  renderProjects();
}

function removeProject(i){
  if(!confirm("Remove this project?"))return;
  gistData.projects.splice(i,1);
  scheduleSave();
  renderProjects();
}

const SPORT_ICON={Lacrosse:"🥍",Basketball:"🏀","American Football":"🏈",Baseball:"⚾",Softball:"🥎",Soccer:"⚽","Field Hockey":"🏑","Ice Hockey":"🏒",Wrestling:"🤼","Track & Field":"🏃","Water Polo":"🤽",Gymnastics:"🤸",Other:"🏆"};

const SF_BASE="https://hudl.lightning.force.com/lightning/r/Account/";
const HUDL_BASE="https://www.hudl.com/home#org=";

function fmtArr(n){return n>=1000?`$${(n/1000).toFixed(1)}k`:n>0?`$${n}`:"—";}
function healthBg(s){const m={Healthy:"var(--green-dim)",Stable:"var(--blue-dim)",Medium:"var(--amber-dim)","At Risk":"#4a2a1a",Critical:"var(--red-dim)"};return m[s]||"var(--surface2)";}

function renderAccounts(){
  const ACCTS=window.ACCOUNT_DATA||[];
  const search=(document.getElementById("acct-search")?.value||"").toLowerCase();
  const sport=document.getElementById("acct-sport")?.value||"all";
  const health=document.getElementById("acct-health")?.value||"all";
  const sortBy=document.getElementById("acct-sort")?.value||"health_score";

  let list=[...ACCTS];
  if(search)list=list.filter(a=>a.name.toLowerCase().includes(search));
  if(sport!=="all")list=list.filter(a=>a.sport===sport);
  if(health!=="all")list=list.filter(a=>a.health_status===health);
  list.sort((a,b)=>{
    if(sortBy==="name")return a.name.localeCompare(b.name);
    if(sortBy==="days_until_renewal")return(a.days_until_renewal||999)-(b.days_until_renewal||999);
    return(b[sortBy]||0)-(a[sortBy]||0);
  });

  document.getElementById("acct-count").textContent=`${list.length} of ${ACCTS.length} accounts`;
  const grid=document.getElementById("acct-grid");
  if(!list.length){grid.innerHTML=`<div class="empty">No accounts match your filters</div>`;return;}

  grid.innerHTML="";
  list.forEach(a=>{
    const hc=HEALTH_COLOR[a.health_status]||"var(--text3)";
    const icon=SPORT_ICON[a.sport]||"🏆";
    const div=document.createElement("div");
    div.className="acct-row";
    div.style.borderLeftColor=hc;
    div.onclick=()=>openAcctModal(a);
    div.innerHTML=`
      <div style="flex:1;min-width:160px">
        <div class="acct-row-name">${icon} ${a.name}</div>
        <div class="acct-row-meta">${a.sport||"—"} · ${a.renewal_date||"—"} · ${a.teams||0} team${a.teams!==1?"s":""}</div>
      </div>
      <div class="acct-row-right">
        <div>
          <div class="health-bar-wrap"><div class="health-bar" style="width:${a.health_score||0}%;background:${hc}"></div></div>
          <div style="font-size:10px;color:${hc};text-align:right;margin-top:2px;font-family:'DM Mono',monospace">${a.health_score||0}</div>
        </div>
        <span class="pill" style="color:${hc};background:${healthBg(a.health_status)};border-color:${hc}30">${a.health_status}</span>
        <div class="arr-val">${fmtArr(a.arr||0)}</div>
        ${(a.days_until_renewal||999)<=90?`<span class="pill" style="color:var(--amber);background:var(--amber-dim);border-color:var(--amber)30">${a.days_until_renewal}d</span>`:""}

    grid.appendChild(div);
  });
}

function scoreARR(a){return a>=5000?5:a>=2000?4:a>=1000?3:a>=400?2:1;}
function scoreUrgency(d){return d<=30?5:d<=60?4:d<=90?3:d<=120?2:1;}
function scoreEngagement(e){if(!e)return null;const s=[];if(e.total!=null){const t=e.total;s.push(t>=4000?5:t>=1500?4:t>=500?3:t>=100?2:1);}if(e.users!=null){const u=e.users;s.push(u>=71?5:u>=41?4:u>=21?3:u>=6?2:1);}if(e.views!=null){const v=e.views;s.push(v>=5000?5:v>=2000?4:v>=800?3:v>=200?2:1);}if(e.hasAssist){const a=e.assist||0;s.push(a>=101?5:a>=51?4:a>=16?3:a>=1?2:1);}if(e.hasFocus){const f=e.focus||0;s.push(f>=71?5:f>=31?4:f>=11?3:f>=1?2:1);}return s.length?Math.max(1,Math.min(5,Math.round(s.reduce((a,b)=>a+b,0)/s.length))):null;}
function getComposite(arr,dl,eS){const aS=scoreARR(arr),uS=scoreUrgency(dl),hasE=eS!==null;const score=aS+uS+(hasE?eS:0),max=hasE?15:10;let tier,color;if(hasE){if(score>=13){tier="Top";color="#f87171";}else if(score>=10){tier="High";color="#fb923c";}else if(score>=7){tier="Mid";color="#facc15";}else{tier="Low";color="#94a3b8";}}else{if(score>=9){tier="Top";color="#f87171";}else if(score>=7){tier="High";color="#fb923c";}else if(score>=5){tier="Mid";color="#facc15";}else{tier="Low";color="#94a3b8";}}return{score,max,tier,color,arrScore:aS,urgencyScore:uS,engScore:eS,hasEng:hasE};}

const PIPE_ORGS=PIPE_RAW.map((r,i)=>{
  const[name,state,owner,stage,arr,lastAct,closeDate,teams,notes,type,orgId]=r;

  const eng=orgId?ENG[orgId]||null:null,engScore=scoreEngagement(eng);

  document.getElementById("pipe-count").textContent=`${list.length} of ${PIPE_ORGS.length} accounts · ${fmtArrP(list.reduce((s,o)=>s+o.arr,0))} ARR`;
  const container=document.getElementById("pipe-list");
  container.innerHTML="";
  list.forEach(org=>{
    const c=org.composite,rc=REP_COLORS[org.rep]||"var(--text3)";
    const intent=gistData.intent?.[org.id];
    const exp=gistData.expansion?.[org.id];
    const ISTYLE={"Committed":{color:"var(--green)",bg:"#2a5c4622",border:"#4a9e7840",icon:"✓"},"Not Renewing":{color:"var(--red)",bg:"#5c2a2a22",border:"#b85c5c40",icon:"✗"},"In Discussion":{color:"var(--amber)",bg:"#6b4f1e22",border:"#c4933a40",icon:"◎"}};
    const ESTYLE={"Expressed Interest":{color:"var(--orange,#fb923c)",bg:"#5a2e1022",border:"#fb923c40",icon:"↑"},"General Opportunity":{color:"var(--text3)",bg:"var(--surface2)",border:"var(--border2)",icon:"~"}};
    const iS=intent?ISTYLE[intent]:null;
    const eS=exp?ESTYLE[exp]:null;
    const urgColor=org.daysLeft<=30?"var(--red)":org.daysLeft<=60?"var(--amber)":"var(--text3)";
    const div=document.createElement("div");
    div.className="acct-row";div.style.borderLeftColor=c.color;
    div.onclick=()=>openPipeModal(org);
    div.innerHTML=`
      <div style="flex:1;min-width:140px">
        <div class="acct-row-name">${org.name}${intent?` <span style="font-size:11px">${iS.icon}</span>`:""}</div>
        <div class="acct-row-meta">${org.state} · ${org.closeDate} · <span style="color:${urgColor}">${org.daysLeft>999?"—":org.daysLeft+"d"}</span></div>
      </div>
      <div class="arr-val" style="color:${org.arr>=2000?"var(--text)":"var(--text3)"}">${fmtArrP(org.arr)}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        ${org.rep!=="—"?`<span class="pill" style="color:${rc};background:${rc}18;border-color:${rc}30">${org.rep}</span>`:""}
        <span class="pill" style="color:${c.color};background:${c.color}18;border-color:${c.color}30">${c.score}/${c.max} · ${c.tier}</span>
        ${org.zeroActivity?`<span class="pill" style="color:var(--red);background:var(--red-dim);border-color:var(--red)30">No Activity</span>`:""}
        ${org.type==="New"?`<span class="pill" style="color:var(--blue);background:var(--blue-dim);border-color:var(--blue)30">NEW</span>`:""}
        ${org.daysLeft<=30&&org.stage!=="Contracted"?`<span class="pill" style="color:var(--red);background:var(--red-dim);border-color:var(--red)30">⚡${org.daysLeft}d</span>`:""}
        <button onclick="cycleExpP(${org.id},event)" style="font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid ${eS?eS.border:"var(--border2)"};background:${eS?eS.bg:"var(--surface2)"};color:${eS?eS.color:"var(--text3)"};cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap">${eS?`${eS.icon} ${exp}`:"+ Exp"}</button>
        <button onclick="cycleIntP(${org.id},event)" style="font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid ${iS?iS.border:"var(--border2)"};background:${iS?iS.bg:"var(--surface2)"};color:${iS?iS.color:"var(--text3)"};cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap">${iS?`${iS.icon} ${intent}`:"+ Intent"}</button>
      </div>`;
    container.appendChild(div);
  });
}

function cycleIntP(id,e){e.stopPropagation();const order=[null,"Committed","Not Renewing","In Discussion"];if(!gistData.intent)gistData.intent={};const cur=gistData.intent[id]??null;const next=order[(order.indexOf(cur)+1)%order.length];if(next===null)delete gistData.intent[id];else gistData.intent[id]=next;scheduleSave();renderPipeline();buildSnapshot();}
function cycleExpP(id,e){e.stopPropagation();const order=[null,"Expressed Interest","General Opportunity"];if(!gistData.expansion)gistData.expansion={};const cur=gistData.expansion[id]??null;const next=order[(order.indexOf(cur)+1)%order.length];if(next===null)delete gistData.expansion[id];else gistData.expansion[id]=next;scheduleSave();renderPipeline();}

function openPipeModal(org){
  const c=org.composite,eng=org.eng;
  const rc=REP_COLORS[org.rep]||"var(--text3)";
  document.getElementById("pipe-modal-inner").innerHTML=`
    <div class="modal-top">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="modal-name">${org.name}</div>
          <div class="modal-sub">${org.state} · ${org.owner} · ${org.type}</div>
          ${org.rep!=="—"?`<span class="pill" style="color:${rc};background:${rc}18;border-color:${rc}30;margin-top:8px;display:inline-block">Rep: ${org.rep}</span>`:""}
        </div>
        <button class="modal-close" onclick="closePipeModal()">Close</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-health" style="background:${c.color}12;border:1px solid ${c.color}25;margin-bottom:14px">
        <div style="font-size:10px;color:${c.color};text-transform:uppercase;letter-spacing:1px;font-weight:600">Priority Score</div>
        <div style="font-size:34px;font-weight:700;color:${c.color};line-height:1.1">${c.score}<span style="font-size:14px;color:var(--text3)"> / ${c.max}</span></div>
        <div style="font-size:12px;color:${c.color};margin-top:2px">${c.tier} Priority</div>
      </div>
      ${eng?`<div style="background:var(--surface2);border-radius:8px;padding:12px 14px;margin-bottom:12px">
        <div class="modal-section-label">Engagement</div>
        <div class="modal-grid" style="margin-bottom:0">
          ${[["Total Actions",eng.total],["Active Users",eng.users],["Video Views",eng.views],eng.hasAssist?["Assist",eng.assist]:null,eng.hasFocus?["Focus",eng.focus]:null].filter(Boolean).map(([k,v])=>`<div class="modal-stat"><div class="modal-stat-label">${k}</div><div class="modal-stat-val" style="color:${v===0?"var(--red)":"var(--text)"}">${v??'—'}</div></div>`).join('')}
        </div>
      </div>`:""}
      <div class="modal-grid">
        ${[["ARR",fmtArrP(org.arr)],["Close Date",org.closeDate],["Days Left",org.daysLeft>999?"—":org.daysLeft+"d"],["Teams",org.teams||"—"],["Stage",org.stage],["Last Activity",org.actDays!=null?org.actDays+"d ago":"No record"]].map(([k,v])=>`<div class="modal-stat"><div class="modal-stat-label">${k}</div><div class="modal-stat-val">${v}</div></div>`).join('')}
      </div>
      ${org.notes?`<div style="background:#1a150022;border:1px solid #3a2e0044;border-radius:7px;padding:9px 12px;font-size:12px;color:var(--amber)">📝 ${org.notes}</div>`:""}
    </div>`;
  document.getElementById("pipe-modal").classList.remove("hidden");
}
function closePipeModal(e){if(!e||e.target===document.getElementById("pipe-modal"))document.getElementById("pipe-modal").classList.add("hidden");}

// ── INIT ──
loadGist();
</script>
</body>
</html>
